<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка фото преподавателей</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-lg p-8">
            <h1 class="text-3xl font-bold text-red-900 mb-6">Загрузка фото преподавателей</h1>
            
            <form id="uploadForm" enctype="multipart/form-data" class="space-y-6">
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">
                        Выберите фото преподавателя
                    </label>
                    <input type="file" 
                           name="photo" 
                           id="photoInput" 
                           accept="image/*"
                           class="block w-full text-sm text-gray-500
                                  file:mr-4 file:py-2 file:px-4
                                  file:rounded-full file:border-0
                                  file:text-sm file:font-semibold
                                  file:bg-red-900 file:text-white
                                  hover:file:bg-red-800
                                  cursor-pointer"
                           required>
                    <p class="mt-2 text-sm text-gray-500">Форматы: JPEG, PNG, GIF, WebP. Максимальный размер: 5MB</p>
                </div>
                
                <div id="preview" class="hidden">
                    <p class="text-gray-700 font-semibold mb-2">Предпросмотр:</p>
                    <img id="previewImage" class="max-w-full h-auto rounded-lg shadow-md" alt="Preview">
                </div>
                
                <button type="submit" 
                        class="w-full bg-red-900 text-white font-semibold py-3 px-6 rounded-lg
                               hover:bg-red-800 transition duration-300 ease-in-out
                               disabled:bg-gray-400 disabled:cursor-not-allowed">
                    Загрузить фото
                </button>
            </form>
            
            <div id="message" class="mt-6 hidden">
                <div id="messageContent" class="p-4 rounded-lg"></div>
            </div>
            
            <div id="uploadedFiles" class="mt-8">
                <h2 class="text-2xl font-bold text-red-900 mb-4">Загруженные фото</h2>
                <div id="filesList" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
            </div>
        </div>
    </div>

    <script>
        const photoInput = document.getElementById('photoInput');
        const preview = document.getElementById('preview');
        const previewImage = document.getElementById('previewImage');
        const uploadForm = document.getElementById('uploadForm');
        const message = document.getElementById('message');
        const messageContent = document.getElementById('messageContent');
        const filesList = document.getElementById('filesList');

        // Предпросмотр изображения
        photoInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImage.src = e.target.result;
                    preview.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        // Отправка формы
        uploadForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData();
            const file = photoInput.files[0];
            
            if (!file) {
                showMessage('Пожалуйста, выберите файл', 'error');
                return;
            }
            
            formData.append('photo', file);
            
            try {
                const response = await fetch('upload_photo.php', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage(`✓ ${result.message}<br>Имя файла: <strong>${result.filename}</strong><br>Путь: <code>${result.path}</code>`, 'success');
                    uploadForm.reset();
                    preview.classList.add('hidden');
                    addUploadedFile(result.filename, result.path);
                } else {
                    showMessage(`✗ ${result.message}`, 'error');
                }
            } catch (error) {
                showMessage('✗ Ошибка при загрузке файла', 'error');
                console.error(error);
            }
        });

        function showMessage(text, type) {
            messageContent.innerHTML = text;
            messageContent.className = `p-4 rounded-lg ${type === 'success' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`;
            message.classList.remove('hidden');
            
            setTimeout(() => {
                message.classList.add('hidden');
            }, 5000);
        }

        function addUploadedFile(filename, path) {
            const fileCard = document.createElement('div');
            fileCard.className = 'border rounded-lg overflow-hidden shadow-md';
            fileCard.innerHTML = `
                <img src="${path}" alt="${filename}" class="w-full h-32 object-cover">
                <div class="p-2 bg-gray-50">
                    <p class="text-xs text-gray-600 truncate">${filename}</p>
                </div>
            `;
            filesList.insertBefore(fileCard, filesList.firstChild);
        }
    </script>
</body>
</html>
